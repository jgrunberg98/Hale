<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Button Width Variations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      background: #FAF8F5;
      font-family: 'Jost', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 40px 20px;
      gap: 48px;
    }
    h1 {
      font-size: 1.4rem;
      font-weight: 400;
      color: #2B2B2B;
      margin: 0;
    }
    .variations {
      display: flex;
      flex-direction: column;
      gap: 48px;
      align-items: center;
    }
    .variation {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .variation label {
      font-size: 0.8rem;
      color: #999;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .btn {
      display: inline-block;
      background: #228244;
      color: #fff;
      font-family: 'Jost', sans-serif;
      font-weight: 600;
      font-size: 1.05rem;
      letter-spacing: 0.04em;
      padding: 18px 0;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      transition: background 0.2s ease;
    }
    .btn:hover { background: #1A6634; }
  </style>
</head>
<body>
  <h1>Button Width Variations (18px vertical padding / 1.05rem)</h1>
  <div class="variations">
    <div class="variation">
      <label>1 &mdash; Narrow (padding: 18px 36px)</label>
      <a href="#" class="btn" style="padding-left: 36px; padding-right: 36px;">Book a Call</a>
    </div>
    <div class="variation">
      <label>2 &mdash; Medium (padding: 18px 56px)</label>
      <a href="#" class="btn" style="padding-left: 56px; padding-right: 56px;">Book a Call</a>
    </div>
    <div class="variation">
      <label>3 &mdash; Wide (padding: 18px 76px)</label>
      <a href="#" class="btn" style="padding-left: 76px; padding-right: 76px;">Book a Call</a>
    </div>
  </div>
</body>
</html>
